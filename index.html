<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HBS</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/hbs/manifest.json" />

  <!-- Theme -->
  <meta name="theme-color" content="#c0406b" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HBS" />
  <link rel="apple-touch-icon" href="/hbs/icon-192.png" />

  <!-- Android / general -->
  <link rel="icon" type="image/png" sizes="192x192" href="/hbs/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/hbs/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #2d0a1e;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #2d0a1e;
      z-index: 100;
      gap: 20px;
      transition: opacity 0.4s ease;
    }

    #loader img {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(192, 64, 107, 0.6);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #loader p {
      color: #e8a0b4;
      font-family: Georgia, serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(192, 64, 107, 0.6); }
      50% { transform: scale(1.06); box-shadow: 0 0 50px rgba(192, 64, 107, 0.9); }
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loader">
    <img src="/hbs/icon-192.png" alt="HBS" />
    <p>Memuatkan...</p>
  </div>

  <!-- GAS App iframe -->
  <iframe
    id="app-frame"
    src="https://script.google.com/a/macros/moe-dl.edu.my/s/AKfycby5F9g4mwjaPiWnpPRTsJ6LfZAT2Gpx1ZlbyDtAPoTfXh7C5nDkewVf5ji46SId159ObQ/exec"
    allow="fullscreen"
    loading="lazy"
    onload="hideLoader()"
  ></iframe>

  <script>
    // Hide loader when iframe loads
    function hideLoader() {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 400);
    }

    // Fallback: hide loader after 8 seconds regardless
    setTimeout(hideLoader, 8000);

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/hbs/sw.js', { scope: '/hbs/' })
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
</body>
</html>
